<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mega | Android Developer</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
font-family:'Poppins',sans-serif;
background:#0d1117;
color:#fff;
overflow-x:hidden;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:center;
gap:30px;
padding:15px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}
nav a{
color:#3ddc84;
text-decoration:none;
font-weight:600;
}
nav a:hover{color:#fff;}

/* HEADER */
header{
text-align:center;
padding:120px 20px 50px;
}

.profile-img{
width:140px;
height:140px;
border-radius:50%;
border:3px solid #3ddc84;
margin-bottom:15px;
object-fit:cover;
box-shadow:0 0 20px #3ddc84;
}

header h1{
font-size:3rem;
color:#3ddc84;
}

header p{
color:#aaa;
margin-top:10px;
}

/* GLASS CARD */
.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
border-radius:15px;
padding:20px;
margin:20px auto;
max-width:700px;
}

/* PROJECTS */
.projects{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:40px;
}

.project{
background:rgba(255,255,255,0.05);
border-radius:15px;
overflow:hidden;
transition:0.4s;
cursor:pointer;
}
.project:hover{
transform:translateY(-10px);
box-shadow:0 15px 30px rgba(61,220,132,0.3);
}

.project img{
width:100%;
height:200px;
object-fit:cover;
}

.project h3{
padding:15px;
color:#3ddc84;
}

.project p{
padding:0 15px 10px;
color:#ccc;
}

/* BUTTON */
.btn{
display:inline-block;
margin:10px 15px 20px;
padding:8px 15px;
background:#3ddc84;
color:#000;
border-radius:8px;
text-decoration:none;
font-weight:600;
}
.btn:hover{
background:#2bbf6a;
}

/* SKILLS */
.skills{
text-align:center;
padding:40px;
}

.skill{
display:inline-block;
padding:10px 20px;
margin:10px;
border-radius:30px;
border:1px solid #3ddc84;
background:rgba(61,220,132,0.1);
}

/* CONTACT */
.contact{
display:flex;
justify-content:center;
padding:60px 20px;
}

.contact-box{
background:rgba(255,255,255,0.05);
padding:30px;
border-radius:15px;
width:100%;
max-width:400px;
}

.contact-box input,
.contact-box textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#161b22;
color:#fff;
}

.contact-box button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#3ddc84;
color:#000;
font-weight:600;
cursor:pointer;
}

/* FOOTER */
footer{
text-align:center;
padding:20px;
background:rgba(0,0,0,0.6);
}
footer a{
color:#3ddc84;
margin:0 10px;
text-decoration:none;
}

/* ANIMATION */
.hidden{
opacity:0;
transform:translateY(40px);
transition:0.8s;
}
.show{
opacity:1;
transform:translateY(0);
}
</style>
</head>

<body>

<nav>
<a href="#about">About</a>
<a href="#projects">Projects</a>
<a href="#skills">Skills</a>
<a href="#contact">Contact</a>
</nav>

<header id="about">
<img src="mega_profile_pic.jpeg" class="profile-img">
<h1>Mega</h1>
<p>Android Developer • Kotlin • Jetpack Compose</p>

<div class="card hidden">
<p>Passionate Android developer building modern apps.</p>
</div>
</header>

<section id="projects">
<h2 style="text-align:center;color:#3ddc84;">Projects</h2>

<div class="projects">

<div class="project hidden">
<img src="mark_entry.jpg">
<h3>Marks Entry</h3>
<p>Teacher-friendly marks system.</p>
<a href="#" class="btn">View</a>
</div>

<div class="project hidden">
<img src="switch_user.jpg">
<h3>Switch User</h3>
<p>Multiple accounts support.</p>
<a href="#" class="btn">View</a>
</div>

</div>
</section>

<section class="skills hidden" id="skills">
<h2 style="color:#3ddc84;">Skills</h2>
<span class="skill">Kotlin</span>
<span class="skill">Android</span>
</section>

<section class="contact hidden" id="contact">
<h2 style="color:#3ddc84;">Contact</h2>

<div class="contact-box">
<input type="text" placeholder="Your Name">
<input type="email" placeholder="Your Email">
<textarea rows="5" placeholder="Your Message"></textarea>
<button>Send</button>
</div>

</section>

<footer>
<a href="https://github.com/megavarshini-k-s">GitHub</a>
</footer>

<script>
const observer=new IntersectionObserver(entries=>{
entries.forEach(e=>{
if(e.isIntersecting){e.target.classList.add('show');}
});
});
document.querySelectorAll('.hidden').forEach(el=>observer.observe(el));
</script>

</body>
</html>
